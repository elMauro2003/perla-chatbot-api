services:
  - type: web
    name: perla-chatbot-api
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --no-input
      python manage.py migrate
    startCommand: gunicorn chatbot_project.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,perla-solutions.vercel.app"
      - key: RENDER
        value: "true"
      # DATABASE_URL

databases:
  - name: perla-chatbot-db
    plan: free
    postgresMajorVersion: 16